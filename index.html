<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#1B2E4B">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Palleo SuiteX">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Palleo SuiteX</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;background:#1B2E4B;font-family:system-ui,sans-serif}
#splash{position:fixed;inset:0;background:linear-gradient(160deg,#0F1F35,#1B2E4B,#1e3a5f);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:10}
.splash-icon{width:80px;height:80px;background:rgba(255,255,255,.1);border-radius:24px;display:flex;align-items:center;justify-content:center;font-size:40px}
.splash-title{font-size:24px;font-weight:700;color:#fff;letter-spacing:-.5px}
.splash-sub{font-size:13px;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.1em}
.splash-loader{width:40px;height:3px;background:rgba(255,255,255,.15);border-radius:3px;margin-top:24px;overflow:hidden}
.splash-loader::after{content:'';display:block;height:100%;width:40%;background:#fff;border-radius:3px;animation:ld 1s ease-in-out infinite alternate}
@keyframes ld{from{transform:translateX(-100%)}to{transform:translateX(300%)}}
#frame{position:fixed;inset:0;border:none;width:100%;height:100%;display:none}
</style>
</head>
<body>
<div id="splash">
  <div class="splash-icon">🏭</div>
  <div class="splash-title">Palleo SuiteX</div>
  <div class="splash-sub">Tread Anywhere · Factory ERP</div>
  <div class="splash-loader"></div>
</div>
<iframe id="frame" src="https://script.google.com/macros/s/AKfycbykkZNBJQEydkr67fdxHtIbyaqsR7Qm_jZkaDAqcXaPqsOMZjUZ0a2lynIAQ9eurMoIIg/exec" allow="*"></iframe>
<script>
// Register service worker for offline shell
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(function(){});
}
// Show app after brief splash
var frame = document.getElementById('frame');
frame.onload = function() {
  setTimeout(function() {
    document.getElementById('splash').style.opacity = '0';
    document.getElementById('splash').style.transition = 'opacity .4s';
    frame.style.display = 'block';
    setTimeout(function(){ document.getElementById('splash').style.display='none'; }, 400);
  }, 600);
};
// Fallback
setTimeout(function(){
  document.getElementById('splash').style.display='none';
  frame.style.display='block';
}, 4000);
</script>
</body>
</html>
